<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ayaz Trade - İki Sekme</title>

<style>
:root{
  --bg:#0b1020;
  --card:#151b33;
  --line:#2b355f;
  --text:#f5f7ff;
  --muted:#aeb8d8;
  --blue:#2f7cff;
  --green:#2cff9a;
  --red:#ff6b7a;
  --yellow:#ffd166;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}
.wrap{
  max-width:820px;
  margin:auto;
  padding:16px 14px 70px;
}
h1{
  font-size:25px;
  margin:10px 0 4px;
}
p{
  color:var(--muted);
  line-height:1.35;
}
.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:14px 0;
}
.tab{
  background:#10172d;
  border:1px solid #344064;
  border-radius:18px;
  padding:18px 8px;
  color:white;
  font-size:20px;
  font-weight:900;
}
.tab.active{
  background:var(--blue);
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:15px;
  margin:12px 0;
}
.search{
  width:100%;
  border-radius:13px;
  border:1px solid #344064;
  background:#0f1528;
  color:white;
  padding:13px;
  margin:8px 0;
  font-size:16px;
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
  max-height:430px;
  overflow:auto;
}
.coin{
  background:#0f1528;
  border:1px solid #344064;
  color:white;
  text-align:left;
  border-radius:14px;
  padding:12px;
  font-size:17px;
  font-weight:900;
}
.coin small{
  display:block;
  color:#9da8c9;
  font-weight:500;
  margin-top:3px;
}
.coin.active{
  border-color:var(--yellow);
  box-shadow:0 0 0 2px rgba(255,209,102,.25);
}
.kpi{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.kpi div{
  background:#0f1528;
  border:1px solid #344064;
  border-radius:14px;
  padding:11px;
  color:#c8d1f2;
}
.kpi b{
  display:block;
  color:white;
  font-size:18px;
  margin-top:4px;
}
.result{
  font-size:42px;
  font-weight:900;
  text-align:center;
  padding:20px;
  border-radius:18px;
  margin:10px 0;
}
.long{
  background:#073d2a;
  color:var(--green);
}
.short{
  background:#47151d;
  color:var(--red);
}
.warn{
  background:#3a2d09;
  color:var(--yellow);
}
.badge{
  display:inline-block;
  padding:7px 10px;
  border-radius:999px;
  margin:4px;
  font-size:13px;
}
.good{
  background:#063922;
  color:#88ffc7;
}
.bad{
  background:#451721;
  color:#ff9aa7;
}
.notice{
  border-left:4px solid var(--yellow);
  padding-left:10px;
  color:#dce4ff;
}
canvas{
  width:100%;
  height:180px;
  background:#0f1528;
  border:1px solid #344064;
  border-radius:14px;
}
@media(max-width:560px){
  .grid,.kpi{grid-template-columns:1fr}
  .result{font-size:38px}
}
</style>
</head>

<body>
<div class="wrap">

<h1>Ayaz Trade</h1>
<p>Üstte sadece iki sekme var. Sekmeye basınca liste hemen aşağıda açılır. Sembole basınca analiz otomatik çalışır.</p>

<div class="tabs">
  <button id="tCrypto" class="tab active" onclick="setTab('crypto')">KRİPTO</button>
  <button id="tStock" class="tab" onclick="setTab('stock')">HİSSE SENEDİ</button>
</div>

<div class="card">
  <input id="search" class="search" placeholder="Ara: BTC, ETH, SOL, THYAO, ASELS..." oninput="drawList()">
  <div id="list" class="grid"></div>
</div>

<div id="out" class="card">
  <p>Kripto listesi hazır. Bir sembole bas.</p>
</div>

<div class="card">
  <canvas id="chart" width="760" height="230"></canvas>
</div>

</div>

<script>
let mode='crypto';
let selected='BTCUSDT';

const CRYPTO=[
['BTCUSDT','Bitcoin'],
['ETHUSDT','Ethereum'],
['BNBUSDT','BNB'],
['SOLUSDT','Solana'],
['XRPUSDT','XRP'],
['DOGEUSDT','Dogecoin'],

const STOCKS=[
['THYAO.IS','Türk Hava Yolları'],
['ASELS.IS','Aselsan'],
['GARAN.IS','Garanti'],
['AKBNK.IS','Akbank'],
['ISCTR.IS','İş Bankası C'],

['TOASO.IS','Tofaş'],
['TAVHL.IS','TAV'],
['PGSUS.IS','Pegasus'],
['TCELL.IS','Turkcell'],
['TTKOM.IS','Türk Telekom'],
['PETKM.IS','Petkim'],
['SASA.IS','Sasa'],
['HEKTS.IS','Hektaş'],
['KRDMD.IS','Kardemir D'],
['ALARK.IS','Alarko'],
['DOHOL.IS','Doğan Holding'],
['MGROS.IS','Migros'],
['ENKAI.IS','Enka'],
['ENJSA.IS','Enerjisa'],
['ARCLK.IS','Arçelik'],
['ASTOR.IS','Astor'],
['EKGYO.IS','Emlak Konut'],
['KOZAL.IS','Koza Altın'],
['KOZAA.IS','Koza Anadolu'],
['GUBRF.IS','Gübre Fabrikaları'],
['ODAS.IS','Odaş'],
['ZOREN.IS','Zorlu Enerji'],
['ULKER.IS','Ülker'],
['CCOLA.IS','Coca Cola İçecek'],
['AEFES.IS','Anadolu Efes'],
['VESTL.IS','Vestel'],
['TKFEN.IS','Tekfen'],
['AKSA.IS','Aksa'],
['AKSEN.IS','Aksa Enerji'],
['BRISA.IS','Brisa'],
['CIMSA.IS','Çimsa'],
['DOAS.IS','Doğuş Otomotiv'],
['HALKB.IS','Halkbank'],
['KONTR.IS','Kontrolmatik'],
['OYAKC.IS','Oyak Çimento'],
['SOKM.IS','Şok Marketler'],
['VAKBN.IS','Vakıfbank']
];

function setTab(m){
  mode=m;
  selected=m==='crypto'?'BTCUSDT':'THYAO.IS';

  document.getElementById('tCrypto').classList.toggle('active',m==='crypto');
  document.getElementById('tStock').classList.toggle('active',m==='stock');

  document.getElementById('search').value='';
  drawList();

  show(`<p>${m==='crypto'?'Kripto':'Hisse senedi'} listesi açıldı. Bir sembole bas.</p>`);
}

function drawList(){
  const q=document.getElementById('search').value.toUpperCase().trim();
  let arr=mode==='crypto'?CRYPTO:STOCKS;

  arr=arr.filter(x=>!q||x[0].includes(q)||x[1].toUpperCase().includes(q));

  document.getElementById('list').innerHTML=arr.map(x=>{
    return `<button class="coin ${x[0]===selected?'active':''}" onclick="pick('${x[0]}')">${x[0]}<small>${x[1]}</small></button>`;
  }).join('');
}

function pick(s){
  selected=s;
  drawList();
  analyzeSymbol(s);
}

function last(a){return a[a.length-1]}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}

function ema(a,n){
  let k=2/(n+1),r=[],e=a[0];
  for(let v of a){
    e=v*k+e*(1-k);
    r.push(e);
  }
  return r;
}

function rsi(a,n=14){
  if(a.length<n+2)return 50;

  let g=0,l=0;

  for(let i=a.length-n;i<a.length;i++){
    let d=a[i]-a[i-1];
    if(d>0)g+=d;
    else l-=d;
  }

  if(l===0)return 100;

  let rs=g/l;
  return 100-100/(1+rs);
}

function macd(a){
  let e12=ema(a,12);
  let e26=ema(a,26);
  let m=e12.map((v,i)=>v-e26[i]);
  let s=ema(m,9);
  return last(m)-last(s);
}

function atr(h,l,c,n=14){
  let tr=[];

  for(let i=1;i<c.length;i++){
    tr.push(Math.max(
      h[i]-l[i],
      Math.abs(h[i]-c[i-1]),
      Math.abs(l[i]-c[i-1])
    ));
  }

  return avg(tr.slice(-n))||0;
}

function stoch(c,h,l,n=14){
  let hi=Math.max(...h.slice(-n));
  let lo=Math.min(...l.slice(-n));
  let d=hi-lo;
  return d===0?50:((last(c)-lo)/d)*100;
}

function fmt(v,d=4){
  return Number(v).toLocaleString('tr-TR',{maximumFractionDigits:d});
}

function show(x){
  document.getElementById('out').innerHTML=x;
}

async function fetchTimeout(url,type='json',ms=12000){
  let c=new AbortController();
  let t=setTimeout(()=>c.abort(),ms);

  try{
    let r=await fetch(url,{signal:c.signal,cache:'no-store'});
    if(!r.ok)throw Error('HTTP '+r.status);
    return type==='text'?await r.text():await r.json();
  }finally{
    clearTimeout(t);
  }
}

async function getCrypto(sym){
  let j=await fetchTimeout(`https://api.binance.com/api/v3/klines?symbol=${sym}&interval=4h&limit=300`);

  return{
    src:'Binance canlı 4S',
    o:j.map(x=>+x[1]),
    h:j.map(x=>+x[2]),
    l:j.map(x=>+x[3]),
    c:j.map(x=>+x[4]),
    v:j.map(x=>+x[5])
  };
}

function yahooUrl(s){
  return `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(s)}?range=2y&interval=1d`;
}

function stooqUrl(s){
  return `https://stooq.com/q/d/l/?s=${encodeURIComponent(s.toLowerCase().replace('.is','.tr'))}&i=d`;
}

function proxies(url){
  return[
    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
  ];
}

function parseYahoo(j){
  let r=j&&j.chart&&j.chart.result&&j.chart.result[0];

  if(!r)throw Error('Yahoo boş');

  let q=r.indicators.quote[0];
  let o=[],h=[],l=[],c=[],v=[];

  for(let i=0;i<q.close.length;i++){
    if(q.close[i]!=null&&q.high[i]!=null&&q.low[i]!=null){
      o.push(q.open[i]??q.close[i]);
      h.push(q.high[i]);
      l.push(q.low[i]);
      c.push(q.close[i]);
      v.push(q.volume[i]||0);
    }
  }

  return{o,h,l,c,v,src:'Yahoo günlük'};
}

function parseCSV(t){
  let lines=t.trim().split(/\r?\n/).slice(1);
  let o=[],h=[],l=[],c=[],v=[];

  for(let line of lines){
    let p=line.split(',');
    let oo=+p[1];
    let hh=+p[2];
    let ll=+p[3];
    let cc=+p[4];
    let vv=+p[5]||0;

    if(isFinite(cc)&&isFinite(hh)&&isFinite(ll)){
      o.push(oo||cc);
      h.push(hh);
      l.push(ll);
      c.push(cc);
      v.push(vv);
    }
  }

  return{o,h,l,c,v,src:'Stooq günlük'};
}

async function getStock(sym){
  let errs=[];

  for(let u of proxies(yahooUrl(sym))){
    try{
      return parseYahoo(await fetchTimeout(u,'json'));
    }catch(e){
      errs.push(e.message);
    }
  }

  for(let u of proxies(stooqUrl(sym))){
    try{
      return parseCSV(await fetchTimeout(u,'text'));
    }catch(e){
      errs.push(e.message);
    }
  }

  throw Error(errs.slice(-4).join(' | '));
}

async function analyzeSymbol(sym){
  show(`<p>Veri çekiliyor: <b>${sym}</b></p>`);

  try{
    let d=mode==='crypto'?await getCrypto(sym):await getStock(sym);
    calc(sym,d);
  }catch(e){
    show(`<div class="result warn">VERİ HATASI</div><p><b>${sym}</b> için veri gelmedi.</p><small>${e.message||e}</small>`);
  }
}

function calc(sym,d){
  let c=d.c;
  let h=d.h;
  let l=d.l;
  let v=d.v;

  if(c.length<80)throw Error('Mum sayısı yetersiz: '+c.length);

  let price=last(c);
  let e21=last(ema(c,21));
  let e55=last(ema(c,55));
  let e200=last(ema(c,Math.min(200,c.length)));
  let rs=rsi(c);
  let mh=macd(c);
  let sto=stoch(c,h,l);
  let at=atr(h,l,c);
  let sup=Math.min(...l.slice(-20));
  let res=Math.max(...h.slice(-20));
  let slope=price-c[c.length-11];
  let volAvg=avg(v.slice(-20))||1;

  let long=[];
  let short=[];

  if(price>e21)long.push('Fiyat EMA21 üstünde');
  else short.push('Fiyat EMA21 altında');

  if(e21>e55)long.push('EMA21 > EMA55 pozitif');
  else short.push('EMA21 < EMA55 negatif');

  if(price>e200)long.push('Ana yapı EMA200 üstü');
  else short.push('Ana yapı EMA200 altı');

  if(mh>0)long.push('MACD pozitif');
  else short.push('MACD negatif');

  if(rs>55)long.push('RSI güçlü');
  else if(rs<45)short.push('RSI zayıf');

  if(sto>60)long.push('Stoch güçlü');
  else if(sto<40)short.push('Stoch zayıf');

  if(slope>0)long.push('Son 10 mum eğimi yukarı');
  else short.push('Son 10 mum eğimi aşağı');

  if(last(v)>volAvg*1.15)long.push('Hacim destekli');
  else short.push('Hacim zayıf');

  if(price>res-at*.2)long.push('Direnç kırılım bölgesi');
  if(price<sup+at*.2)short.push('Destek tehlike bölgesi');

  let decision=long.length>=short.length?'LONG':'SHORT';
  let conf=Math.round(Math.max(long.length,short.length)/(long.length+short.length)*100);

  let entry=price;
  let stop=decision==='LONG'
    ? Math.max(entry-at*1.5,sup-at*.1)
    : Math.min(entry+at*1.5,res+at*.1);

  let risk=Math.abs(entry-stop)||at*1.5;

  let tp1=decision==='LONG'?entry+risk:entry-risk;
  let tp2=decision==='LONG'?entry+risk*2:entry-risk*2;
  let tp3=decision==='LONG'?entry+risk*3:entry-risk*3;

  drawChart(c,entry,stop,tp2);

  show(`
  <div class="result ${decision==='LONG'?'long':'short'}">${decision}</div>

  <div class="kpi">
    <div>Sembol<b>${sym}</b></div>
    <div>Kaynak<b>${d.src}</b></div>
    <div>Güven<b>%${conf}</b></div>
    <div>Fiyat<b>${fmt(price)}</b></div>
    <div>Giriş<b>${fmt(entry)}</b></div>
    <div>Stop<b>${fmt(stop)}</b></div>
    <div>Hedef 1<b>${fmt(tp1)}</b></div>
    <div>Hedef 2<b>${fmt(tp2)}</b></div>
    <div>Hedef 3<b>${fmt(tp3)}</b></div>
    <div>ATR<b>${fmt(at)}</b></div>
  </div>

  <p class="notice">
  ${mode==='stock'&&decision==='SHORT'
    ? 'Hisse tarafında SHORT; açığa satış değil, çıkış/kâr al/dikkat uyarısıdır.'
    : 'Sistem emir göndermez; karar destek analizidir.'}
  </p>

  <p><b>LONG nedenleri:</b><br>${long.map(x=>`<span class="badge good">${x}</span>`).join('')}</p>
  <p><b>SHORT nedenleri:</b><br>${short.map(x=>`<span class="badge bad">${x}</span>`).join('')}</p>

  <p>
  <b>RSI:</b> ${rs.toFixed(2)} |
  <b>Stoch:</b> ${sto.toFixed(2)} |
  <b>Destek:</b> ${fmt(sup)} |
  <b>Direnç:</b> ${fmt(res)}
  </p>
  `);
}

function drawChart(c,entry,stop,tp){
  let canvas=document.getElementById('chart');
  let ctx=canvas.getContext('2d');
  let w=canvas.width;
  let h=canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle='#0f1528';
  ctx.fillRect(0,0,w,h);

  let arr=c.slice(-90);
  let min=Math.min(...arr,entry,stop,tp);
  let max=Math.max(...arr,entry,stop,tp);
  let pad=(max-min)*.08||1;

  min-=pad;
  max+=pad;

  let y=v=>h-20-(v-min)/(max-min)*(h-40);
  let x=i=>20+i/(arr.length-1)*(w-40);

  ctx.strokeStyle='#7aa2ff';
  ctx.lineWidth=2;
  ctx.beginPath();

  arr.forEach((v,i)=>{
    if(i)ctx.lineTo(x(i),y(v));
    else ctx.moveTo(x(i),y(v));
  });

  ctx.stroke();

  function line(v,color,name){
    ctx.strokeStyle=color;
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(20,y(v));
    ctx.lineTo(w-20,y(v));
    ctx.stroke();

    ctx.fillStyle=color;
    ctx.font='13px Arial';
    ctx.fillText(name+' '+fmt(v),24,y(v)-4);
  }

  line(entry,'#ffd166','Giriş');
  line(stop,'#ff6b7a','Stop');
  line(tp,'#2cff9a','Hedef');
}

drawList();
</script>
