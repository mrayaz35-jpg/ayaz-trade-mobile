<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ayaz Trade Crypto</title>

<style>
:root{
  --bg:#0b1020;
  --card:#151b33;
  --line:#2b355f;
  --text:#f5f7ff;
  --muted:#aeb8d8;
  --blue:#2f7cff;
  --green:#2cff9a;
  --red:#ff6b7a;
  --yellow:#ffd166;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,Helvetica,sans-serif;
}
.wrap{
  max-width:860px;
  margin:auto;
  padding:14px 12px 70px;
}
h1{
  font-size:24px;
  margin:8px 0 4px;
}
p{
  color:var(--muted);
  line-height:1.35;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin:10px 0;
}
.top-title{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
}
.small{
  font-size:13px;
  color:#9da8c9;
}
.search{
  width:100%;
  border-radius:13px;
  border:1px solid #344064;
  background:#0f1528;
  color:white;
  padding:12px;
  margin:8px 0;
  font-size:16px;
}
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  max-height:132px;
  overflow:auto;
  padding:2px 0 6px;
}
.chip{
  white-space:nowrap;
  background:#0f1528;
  border:1px solid #344064;
  color:white;
  border-radius:999px;
  padding:8px 11px;
  font-size:14px;
  font-weight:800;
}
.chip.active{
  background:#3a2d09;
  border-color:var(--yellow);
  color:#fff;
}
.tf{
  display:flex;
  gap:7px;
  margin:8px 0 4px;
}
.tf button{
  background:#0f1528;
  border:1px solid #344064;
  color:white;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
}
.tf button.active{
  background:var(--blue);
}
.result{
  font-size:42px;
  font-weight:900;
  text-align:center;
  padding:18px;
  border-radius:18px;
  margin:10px 0;
}
.long{
  background:#073d2a;
  color:var(--green);
}
.short{
  background:#47151d;
  color:var(--red);
}
.warn{
  background:#3a2d09;
  color:var(--yellow);
}
.kpi{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.kpi div{
  background:#0f1528;
  border:1px solid #344064;
  border-radius:14px;
  padding:10px;
  color:#c8d1f2;
}
.kpi b{
  display:block;
  color:white;
  font-size:17px;
  margin-top:4px;
}
.badge{
  display:inline-block;
  padding:7px 10px;
  border-radius:999px;
  margin:4px;
  font-size:13px;
}
.good{
  background:#063922;
  color:#88ffc7;
}
.bad{
  background:#451721;
  color:#ff9aa7;
}
.info{
  background:#24304f;
  color:#dce4ff;
}
.notice{
  border-left:4px solid var(--yellow);
  padding-left:10px;
  color:#dce4ff;
}
canvas{
  width:100%;
  height:170px;
  background:#0f1528;
  border:1px solid #344064;
  border-radius:14px;
}
@media(max-width:560px){
  .kpi{grid-template-columns:1fr}
  .result{font-size:36px}
}
</style>
</head>

<body>
<div class="wrap">

<div class="top-title">
  <div>
    <h1>Ayaz Trade Crypto</h1>
    <div class="small">Sadece kripto. Binance canlı veri. Sembole bas, analiz al.</div>
  </div>
</div>

<div class="card">
  <input id="search" class="search" placeholder="Ara: BTC, ETH, SOL, AVAX..." oninput="renderList()">

  <div id="chips" class="chips"></div>

  <div class="tf">
    <button onclick="setTf('15m')" data-tf="15m">15D</button>
    <button onclick="setTf('1h')" data-tf="1h">1S</button>
    <button onclick="setTf('4h')" data-tf="4h" class="active">4S</button>
    <button onclick="setTf('1d')" data-tf="1d">1G</button>
  </div>
</div>

<div id="out" class="card">
  <p>Kripto listesi yükleniyor...</p>
</div>

<div class="card">
  <canvas id="chart" width="760" height="220"></canvas>
</div>

</div>

<script>
let selected="BTCUSDT";
let tf="4h";
let items=[];

const FALLBACK=[
["BTCUSDT","Bitcoin"],
["ETHUSDT","Ethereum"],
["BNBUSDT","BNB"],
["SOLUSDT","Solana"],
["XRPUSDT","XRP"],
["DOGEUSDT","Dogecoin"],
["ADAUSDT","Cardano"],
["AVAXUSDT","Avalanche"],
["LINKUSDT","Chainlink"],
["DOTUSDT","Polkadot"],
["TRXUSDT","Tron"],
["MATICUSDT","Polygon"],
["LTCUSDT","Litecoin"],
["BCHUSDT","Bitcoin Cash"],
["ATOMUSDT","Cosmos"],
["NEARUSDT","Near"],
["APTUSDT","Aptos"],
["OPUSDT","Optimism"],
["ARBUSDT","Arbitrum"],
["INJUSDT","Injective"],
["FILUSDT","Filecoin"],
["ETCUSDT","Ethereum Classic"],
["SUIUSDT","Sui"],
["SEIUSDT","Sei"],
["TIAUSDT","Celestia"],
["RUNEUSDT","Thorchain"],
["AAVEUSDT","Aave"],
["UNIUSDT","Uniswap"],
["MKRUSDT","Maker"],
["FETUSDT","Fetch AI"],
["RNDRUSDT","Render"],
["GRTUSDT","Graph"],
["PEPEUSDT","Pepe"]
];

const TOP=[
"BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT","XRPUSDT","DOGEUSDT","ADAUSDT","AVAXUSDT",
"LINKUSDT","DOTUSDT","TRXUSDT","MATICUSDT","LTCUSDT","BCHUSDT","ATOMUSDT","NEARUSDT",
"APTUSDT","OPUSDT","ARBUSDT","INJUSDT","FILUSDT","ETCUSDT","SUIUSDT","SEIUSDT",
"TIAUSDT","RUNEUSDT","AAVEUSDT","UNIUSDT","MKRUSDT","FETUSDT","RNDRUSDT","GRTUSDT","PEPEUSDT"
];

function show(x){
  document.getElementById("out").innerHTML=x;
}

function last(a){
  return a[a.length-1];
}

function avg(a){
  return a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;
}

function std(a){
  let m=avg(a);
  return Math.sqrt(avg(a.map(x=>(x-m)*(x-m))))||0;
}

function fmt(v,d=4){
  return Number(v).toLocaleString("tr-TR",{maximumFractionDigits:d});
}

function ema(a,n){
  let k=2/(n+1);
  let r=[];
  let e=a[0];

  for(let v of a){
    e=v*k+e*(1-k);
    r.push(e);
  }

  return r;
}

function sma(a,n){
  let r=[];

  for(let i=0;i<a.length;i++){
    let s=a.slice(Math.max(0,i-n+1),i+1);
    r.push(avg(s));
  }

  return r;
}

function rsi(a,n=14){
  if(a.length<n+2)return 50;

  let g=0;
  let l=0;

  for(let i=a.length-n;i<a.length;i++){
    let d=a[i]-a[i-1];
    if(d>0)g+=d;
    else l-=d;
  }

  if(l===0)return 100;

  let rs=g/l;
  return 100-100/(1+rs);
}

function macd(a){
  let e12=ema(a,12);
  let e26=ema(a,26);
  let m=e12.map((v,i)=>v-e26[i]);
  let s=ema(m,9);

  return {
    macd:last(m),
    signal:last(s),
    hist:last(m)-last(s)
  };
}

function atr(h,l,c,n=14){
  let tr=[];

  for(let i=1;i<c.length;i++){
    tr.push(Math.max(
      h[i]-l[i],
      Math.abs(h[i]-c[i-1]),
      Math.abs(l[i]-c[i-1])
    ));
  }

  return avg(tr.slice(-n))||0;
}

function stoch(c,h,l,n=14){
  let hi=Math.max(...h.slice(-n));
  let lo=Math.min(...l.slice(-n));
  let d=hi-lo;

  return d===0 ? 50 : ((last(c)-lo)/d)*100;
}

function roc(c,n=10){
  if(c.length<=n)return 0;
  return ((last(c)-c[c.length-1-n])/c[c.length-1-n])*100;
}

function boll(c,n=20,m=2){
  let s=c.slice(-n);
  let mid=avg(s);
  let sd=std(s);

  return {
    mid,
    up:mid+m*sd,
    lo:mid-m*sd,
    width:mid ? ((m*sd*2)/mid)*100 : 0
  };
}

async function fetchTimeout(url,type="json",ms=12000){
  let controller=new AbortController();
  let t=setTimeout(()=>controller.abort(),ms);

  try{
    let r=await fetch(url,{signal:controller.signal,cache:"no-store"});
    if(!r.ok)throw Error("HTTP "+r.status);
    return type==="text" ? await r.text() : await r.json();
  }finally{
    clearTimeout(t);
  }
}

async function loadList(){
  show("<p>Binance kripto listesi yükleniyor...</p>");

  try{
    let j=await fetchTimeout("https://api.binance.com/api/v3/exchangeInfo");

    items=j.symbols
      .filter(x=>x.status==="TRADING" && x.quoteAsset==="USDT")
      .map(x=>[x.symbol,x.baseAsset])
      .sort((a,b)=>{
        let ia=TOP.indexOf(a[0]);
        let ib=TOP.indexOf(b[0]);

        if(ia===-1)ia=9999;
        if(ib===-1)ib=9999;

        return ia-ib || a[0].localeCompare(b[0]);
      });

    renderList();

    show(`<p><b>${items.length}</b> adet Binance USDT kripto listelendi. Sembole basınca analiz otomatik çalışır.</p>`);
  }catch(e){
    items=[...FALLBACK];
    renderList();
    show(`<div class="result warn">LİSTE UYARISI</div><p>Canlı liste gelmedi, yedek liste açıldı.</p><small>${e.message||e}</small>`);
  }
}

function renderList(){
  let q=document.getElementById("search").value.toUpperCase().trim();

  let arr=items
    .filter(x=>!q || x[0].includes(q) || String(x[1]).toUpperCase().includes(q))
    .slice(0,350);

  document.getElementById("chips").innerHTML=arr.map(x=>{
    return `<button class="chip ${x[0]===selected?'active':''}" onclick="pick('${x[0]}')">${x[0]}</button>`;
  }).join("");
}

function pick(symbol){
  selected=symbol;
  renderList();
  analyzeSelected();
}

function setTf(newTf){
  tf=newTf;

  document.querySelectorAll(".tf button").forEach(b=>{
    b.classList.toggle("active",b.dataset.tf===tf);
  });

  analyzeSelected();
}

async function getBars(symbol){
  let url=`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=300`;
  let j=await fetchTimeout(url);

  if(!Array.isArray(j))throw Error("Binance veri formatı hatalı");

  return {
    ok:true,
    source:"Binance Kline",
    symbol,
    tf,
    generatedAt:new Date().toISOString(),
    bars:j.map(x=>({
      openTime:x[0],
      open:+x[1],
      high:+x[2],
      low:+x[3],
      close:+x[4],
      volume:+x[5],
      closeTime:x[6]
    })),
    attempts:[
      {source:"Binance Kline",ok:true}
    ]
  };
}

async function analyzeSelected(){
  show(`<p>Veri çekiliyor: <b>${selected}</b> / <b>${tf}</b></p>`);

  try{
    let data=await getBars(selected);

    if(!data.bars || data.bars.length<80){
      throw Error("Yetersiz mum verisi: "+(data.bars?data.bars.length:0));
    }

    calc(data);
  }catch(e){
    show(`
    <div class="result warn">VERİ HATASI</div>
    <p><b>${selected}</b> için Binance verisi alınamadı.</p>
    <p>Bağ denemesi:</p>
    <span class="badge bad">Binance Kline: ÇALIŞMADI ${e.message||e}</span>
    `);
  }
}

function addContext(name,fn,ctx,long,short,info){
  try{
    let r=fn();

    ctx.push({
      name,
      ok:true,
      side:r.side || "info",
      msg:r.msg || ""
    });

    if(r.side==="long")long.push(`${name}: ${r.msg}`);
    else if(r.side==="short")short.push(`${name}: ${r.msg}`);
    else info.push(`${name}: ${r.msg}`);
  }catch(e){
    ctx.push({
      name,
      ok:false,
      side:"fail",
      msg:e.message||String(e)
    });
  }
}

function calc(data){
  let bars=data.bars;

  let o=bars.map(x=>x.open);
  let h=bars.map(x=>x.high);
  let l=bars.map(x=>x.low);
  let c=bars.map(x=>x.close);
  let v=bars.map(x=>x.volume);

  let price=last(c);

  let e9=last(ema(c,9));
  let e21=last(ema(c,21));
  let e55=last(ema(c,55));
  let e200=last(ema(c,Math.min(200,c.length)));
  let s20=last(sma(c,20));

  let rs=rsi(c);
  let mc=macd(c);
  let sto=stoch(c,h,l);
  let at=atr(h,l,c);
  let rc=roc(c,10);
  let bb=boll(c);

  let sup20=Math.min(...l.slice(-20));
  let res20=Math.max(...h.slice(-20));
  let sup50=Math.min(...l.slice(-50));
  let res50=Math.max(...h.slice(-50));

  let volNow=last(v)||0;
  let volAvg=avg(v.slice(-20))||1;

  let slope10=price-c[c.length-11];
  let slope20=price-c[c.length-21];

  let fib382=res50-(res50-sup50)*0.382;
  let fib618=res50-(res50-sup50)*0.618;

  let body=Math.abs(last(c)-last(o));
  let range=Math.max(last(h)-last(l),0.0000001);
  let upper=last(h)-Math.max(last(o),last(c));
  let lower=Math.min(last(o),last(c))-last(l);

  let long=[];
  let short=[];
  let info=[];
  let ctx=[];

  addContext("EMA21 Fiyat Konumu",()=>price>e21
    ?{side:"long",msg:"Fiyat EMA21 üstünde"}
    :{side:"short",msg:"Fiyat EMA21 altında"},ctx,long,short,info);

  addContext("EMA Trend Dizilimi",()=>e9>e21&&e21>e55
    ?{side:"long",msg:"EMA9 > EMA21 > EMA55 pozitif"}
    :e9<e21&&e21<e55
      ?{side:"short",msg:"EMA9 < EMA21 < EMA55 negatif"}
      :{side:"info",msg:"EMA dizilimi karışık"},ctx,long,short,info);

  addContext("EMA200 Ana Yapı",()=>price>e200
    ?{side:"long",msg:"Fiyat EMA200 üstünde"}
    :{side:"short",msg:"Fiyat EMA200 altında"},ctx,long,short,info);

  addContext("SMA20 Kısa Ortalama",()=>price>s20
    ?{side:"long",msg:"Fiyat SMA20 üstünde"}
    :{side:"short",msg:"Fiyat SMA20 altında"},ctx,long,short,info);

  addContext("MACD",()=>mc.hist>0
    ?{side:"long",msg:"MACD histogram pozitif"}
    :{side:"short",msg:"MACD histogram negatif"},ctx,long,short,info);

  addContext("RSI",()=>rs>55
    ?{side:"long",msg:"RSI güçlü bölgede"}
    :rs<45
      ?{side:"short",msg:"RSI zayıf bölgede"}
      :{side:"info",msg:"RSI nötr bölgede"},ctx,long,short,info);

  addContext("Stochastic",()=>sto>60
    ?{side:"long",msg:"Stoch güçlü"}
    :sto<40
      ?{side:"short",msg:"Stoch zayıf"}
      :{side:"info",msg:"Stoch nötr"},ctx,long,short,info);

  addContext("ROC Momentum",()=>rc>0
    ?{side:"long",msg:"ROC pozitif"}
    :{side:"short",msg:"ROC negatif"},ctx,long,short,info);

  addContext("10/20 Mum Eğimi",()=>slope10>0&&slope20>0
    ?{side:"long",msg:"Kısa eğim yukarı"}
    :slope10<0&&slope20<0
      ?{side:"short",msg:"Kısa eğim aşağı"}
      :{side:"info",msg:"Eğim karışık"},ctx,long,short,info);

  addContext("Hacim",()=>volNow>volAvg*1.15
    ?{side:"long",msg:"Son hacim ortalama üstü"}
    :{side:"short",msg:"Hacim zayıf"},ctx,long,short,info);

  addContext("Destek / Direnç",()=>price>res20-at*0.20
    ?{side:"long",msg:"Direnç kırılım bölgesi"}
    :price<sup20+at*0.20
      ?{side:"short",msg:"Destek tehlike bölgesi"}
      :{side:"info",msg:"Destek/direnç arası bölgede"},ctx,long,short,info);

  addContext("Bollinger",()=>price>bb.up
    ?{side:"long",msg:"Üst bant kırılımı"}
    :price<bb.lo
      ?{side:"short",msg:"Alt bant baskısı"}
      :price>bb.mid
        ?{side:"long",msg:"Bollinger orta bant üstü"}
        :{side:"short",msg:"Bollinger orta bant altı"},ctx,long,short,info);

  addContext("Fibonacci Bölgesi",()=>price>fib382
    ?{side:"long",msg:"Fiyat fib 0.382 üstünde"}
    :price<fib618
      ?{side:"short",msg:"Fiyat fib 0.618 altında"}
      :{side:"info",msg:"Fibonacci orta bölgede"},ctx,long,short,info);

  addContext("Mum Fitili",()=>lower>body*2&&upper<body*1.2
    ?{side:"long",msg:"Alt fitil tepki potansiyeli"}
    :upper>body*2&&lower<body*1.2
      ?{side:"short",msg:"Üst fitil baskı potansiyeli"}
      :body/range<0.15
        ?{side:"info",msg:"Doji / kararsız mum"}
        :last(c)>last(o)
          ?{side:"long",msg:"Son mum yeşil"}
          :{side:"short",msg:"Son mum kırmızı"},ctx,long,short,info);

  addContext("3 Mum Davranışı",()=>c[c.length-1]>c[c.length-2]&&c[c.length-2]>c[c.length-3]
    ?{side:"long",msg:"3 mum yukarı tepki"}
    :c[c.length-1]<c[c.length-2]&&c[c.length-2]<c[c.length-3]
      ?{side:"short",msg:"3 mum aşağı baskı"}
      :{side:"info",msg:"3 mum net yön vermiyor"},ctx,long,short,info);

  let worked=ctx.filter(x=>x.ok).length;
  let failed=ctx.filter(x=>!x.ok).length;

  let directional=long.length+short.length;
  let decision=long.length>=short.length ? "LONG" : "SHORT";

  let confidence=directional
    ? Math.round(Math.max(long.length,short.length)/directional*100)
    : 50;

  confidence=Math.min(95,Math.max(35,confidence));

  let entry=price;

  let atrStopLong=entry-at*1.5;
  let atrStopShort=entry+at*1.5;

  let srStopLong=sup20-at*0.10;
  let srStopShort=res20+at*0.10;

  let stop=decision==="LONG"
    ? Math.max(atrStopLong,srStopLong)
    : Math.min(atrStopShort,srStopShort);

  let risk=Math.abs(entry-stop);
  if(!isFinite(risk)||risk<=0)risk=at*1.5;

  let tp1=decision==="LONG" ? entry+risk : entry-risk;
  let tp2=decision==="LONG" ? entry+risk*2 : entry-risk*2;
  let tp3=decision==="LONG" ? entry+risk*3 : entry-risk*3;

  drawChart(c,entry,stop,tp2);

  let lastTime=new Date(last(bars).closeTime).toLocaleString("tr-TR");

  show(`
  <div class="result ${decision==="LONG"?"long":"short"}">${decision}</div>

  <div class="kpi">
    <div>Sembol<b>${data.symbol}</b></div>
    <div>Time Frame<b>${tf}</b></div>
    <div>Kaynak<b>${data.source}</b></div>
    <div>Son Veri<b>${lastTime}</b></div>
    <div>Güven<b>%${confidence}</b></div>
    <div>Fiyat<b>${fmt(price)}</b></div>
    <div>Giriş<b>${fmt(entry)}</b></div>
    <div>Stop<b>${fmt(stop)}</b></div>
    <div>Hedef 1<b>${fmt(tp1)}</b></div>
    <div>Hedef 2<b>${fmt(tp2)}</b></div>
    <div>Hedef 3<b>${fmt(tp3)}</b></div>
    <div>ATR<b>${fmt(at)}</b></div>
  </div>

  <p>
    <b>Veri bağı:</b>
    ${(data.attempts||[]).map(a=>`<span class="badge ${a.ok?'good':'bad'}">${a.source}: ${a.ok?'ÇALIŞTI':'ÇALIŞMADI'}</span>`).join("")}
  </p>

  <p>
    <b>Çalışan bağlam:</b> ${worked}
    <span class="badge good">ÇALIŞTI</span>
    <b>Çalışmayan bağlam:</b> ${failed}
    <span class="badge ${failed?'bad':'good'}">${failed}</span>
  </p>

  <p class="notice">Sistem emir göndermez; karar destek analizidir.</p>

  <p><b>LONG sebepleri:</b><br>${long.map(x=>`<span class="badge good">${x}</span>`).join("")}</p>

  <p><b>SHORT sebepleri:</b><br>${short.map(x=>`<span class="badge bad">${x}</span>`).join("")}</p>

  <p><b>Nötr / Bilgi:</b><br>${info.map(x=>`<span class="badge info">${x}</span>`).join("")}</p>

  <p><b>Çalışan analiz bağları:</b><br>
  ${ctx.filter(x=>x.ok).map(x=>`<span class="badge info">${x.name}</span>`).join("")}
  </p>

  ${failed ? `<p><b>Çalışmayan bağlar:</b><br>${ctx.filter(x=>!x.ok).map(x=>`<span class="badge bad">${x.name}: ${x.msg}</span>`).join("")}</p>` : ""}
  `);
}

function drawChart(c,entry,stop,tp){
  let canvas=document.getElementById("chart");
  let ctx=canvas.getContext("2d");
  let w=canvas.width;
  let h=canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="#0f1528";
  ctx.fillRect(0,0,w,h);

  let arr=c.slice(-90);
  let min=Math.min(...arr,entry,stop,tp);
  let max=Math.max(...arr,entry,stop,tp);
  let pad=(max-min)*0.08||1;

  min-=pad;
  max+=pad;

  let y=v=>h-20-(v-min)/(max-min)*(h-40);
  let x=i=>20+i/(arr.length-1)*(w-40);

  ctx.strokeStyle="#7aa2ff";
  ctx.lineWidth=2;
  ctx.beginPath();

  arr.forEach((v,i)=>{
    if(i)ctx.lineTo(x(i),y(v));
    else ctx.moveTo(x(i),y(v));
  });

  ctx.stroke();

  function line(v,color,name){
    ctx.strokeStyle=color;
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(20,y(v));
    ctx.lineTo(w-20,y(v));
    ctx.stroke();

    ctx.fillStyle=color;
    ctx.font="13px Arial";
    ctx.fillText(name+" "+fmt(v),24,y(v)-4);
  }

  line(entry,"#ffd166","Giriş");
  line(stop,"#ff6b7a","Stop");
  line(tp,"#2cff9a","Hedef");
}

loadList();
</script>
