<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ayaz Trade Crypto Pro</title>
<style>
:root{--bg:#0b1020;--card:#151b33;--card2:#10172c;--line:#2b355f;--mut:#aeb8d8;--blue:#2f7cff;--green:#2cff9a;--red:#ff6b7a;--yel:#ffd166}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#fff;font-family:Arial,Helvetica,sans-serif}.wrap{max-width:900px;margin:auto;padding:16px 12px 70px}h1{font-size:28px;margin:8px 0 4px}.small,p{color:var(--mut);line-height:1.35}.small{font-size:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:14px;margin:12px 0}.selectedBox{width:100%;background:#0f1528;border:1px solid var(--yel);color:#fff;border-radius:18px;padding:16px;font-size:24px;font-weight:900;text-align:left;margin:6px 0 10px}.selectedBox small{display:block;color:#aeb8d8;font-size:14px;font-weight:600;margin-top:5px}.hidden{display:none}.search{width:100%;border-radius:14px;border:1px solid #344064;background:#0f1528;color:white;padding:12px;margin:8px 0;font-size:16px}.chips{display:flex;flex-wrap:wrap;gap:7px;max-height:190px;overflow:auto}.chip{white-space:nowrap;background:#0f1528;border:1px solid #344064;color:white;border-radius:999px;padding:8px 11px;font-size:14px;font-weight:800}.chip.active{background:#3a2d09;border-color:var(--yel)}.tf{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}.tf button,.miniBtn{background:#0f1528;border:1px solid #344064;color:white;border-radius:999px;padding:9px 13px;font-weight:900}.tf button.active{background:var(--blue)}.miniBtn{font-size:13px}.result{font-size:44px;font-weight:900;text-align:center;padding:18px;border-radius:20px;margin:10px 0}.long{background:#073d2a;color:var(--green)}.short{background:#47151d;color:var(--red)}.warn{background:#3a2d09;color:var(--yel)}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px}.kpi div{background:#0f1528;border:1px solid #344064;border-radius:15px;padding:10px;color:#c8d1f2}.kpi b{display:block;color:#fff;font-size:17px;margin-top:4px}.badge{display:inline-block;padding:7px 10px;border-radius:999px;margin:4px;font-size:13px}.good{background:#063922;color:#88ffc7}.bad{background:#451721;color:#ff9aa7}.info{background:#24304f;color:#dce4ff}.notice{border-left:4px solid var(--yel);padding-left:10px;color:#dce4ff}.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.toolbar span{color:var(--mut);font-size:13px}canvas{width:100%;height:190px;background:#0f1528;border:1px solid #344064;border-radius:16px}@media(max-width:560px){.kpi{grid-template-columns:1fr}.result{font-size:38px}h1{font-size:25px}}
</style>
</head>
<body>
<div class="wrap">
<h1>Ayaz Trade Crypto Pro</h1>
<div class="small">Veri mimarisi: GitHub Actions → <b>data/market.json</b>. Tarayıcı dış API çekmez; CORS / Load failed sorunu bu yüzden kesilir.</div>

<div class="card">
  <button id="selectedBox" class="selectedBox" onclick="toggleList()">BTCUSDT<small>Liste kapalı - açmak için dokun</small></button>
  <div id="listPanel" class="hidden">
    <input id="search" class="search" placeholder="Ara: BTC, ETH, SOL, AVAX..." oninput="renderList()">
    <div id="chips" class="chips"></div>
  </div>
  <div class="tf" id="tfBox">
    <button onclick="setTf('5m')" data-tf="5m">5D</button>
    <button onclick="setTf('15m')" data-tf="15m">15D</button>
    <button onclick="setTf('30m')" data-tf="30m">30D</button>
    <button onclick="setTf('1h')" data-tf="1h">1S</button>
    <button onclick="setTf('2h')" data-tf="2h">2S</button>
    <button onclick="setTf('4h')" data-tf="4h" class="active">4S</button>
    <button onclick="setTf('1d')" data-tf="1d">1G</button>
  </div>
  <div class="toolbar">
    <button class="miniBtn" onclick="loadMarketData(true)">Veriyi yeniden oku</button>
    <span id="dataStatus">Veri bekleniyor...</span>
  </div>
</div>

<div id="out" class="card"><p>Veri dosyası yükleniyor...</p></div>
<div class="card"><canvas id="chart" width="760" height="240"></canvas></div>
</div>

<script>
let selected='BTCUSDT',tf='4h',listOpen=false,marketData=null;
let symbols=['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','DOGEUSDT','ADAUSDT','AVAXUSDT','LINKUSDT','DOTUSDT','TRXUSDT','MATICUSDT','LTCUSDT','BCHUSDT','ATOMUSDT'];
const tfLabels={'5m':'5 dakika','15m':'15 dakika','30m':'30 dakika','1h':'1 saat','2h':'2 saat','4h':'4 saat','1d':'1 gün'};
function el(id){return document.getElementById(id)}function show(x){el('out').innerHTML=x}function last(a){return a[a.length-1]}function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}function std(a){let m=avg(a);return Math.sqrt(avg(a.map(x=>(x-m)*(x-m))))||0}function fmt(v,d=4){return Number(v).toLocaleString('tr-TR',{maximumFractionDigits:d})}
function ema(a,n){let k=2/(n+1),r=[],e=a[0];for(let v of a){e=v*k+e*(1-k);r.push(e)}return r}function sma(a,n){return a.map((_,i)=>avg(a.slice(Math.max(0,i-n+1),i+1)))}function rsi(a,n=14){if(a.length<n+2)return 50;let g=0,l=0;for(let i=a.length-n;i<a.length;i++){let d=a[i]-a[i-1];d>0?g+=d:l-=d}if(l===0)return 100;let rs=g/l;return 100-100/(1+rs)}function macd(a){let e12=ema(a,12),e26=ema(a,26),m=e12.map((v,i)=>v-e26[i]),s=ema(m,9);return{hist:last(m)-last(s)}}function atr(h,l,c,n=14){let tr=[];for(let i=1;i<c.length;i++)tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])));return avg(tr.slice(-n))||0}function stoch(c,h,l,n=14){let hi=Math.max(...h.slice(-n)),lo=Math.min(...l.slice(-n)),d=hi-lo;return d?((last(c)-lo)/d)*100:50}function roc(c,n=10){return c.length>n?((last(c)-c[c.length-1-n])/c[c.length-1-n])*100:0}function boll(c,n=20,m=2){let s=c.slice(-n),mid=avg(s),sd=std(s);return{mid,up:mid+m*sd,lo:mid-m*sd,width:mid?((m*sd*2)/mid)*100:0}}function highest(a,n){return Math.max(...a.slice(-n))}function lowest(a,n){return Math.min(...a.slice(-n))}function obv(c,v){let o=[0];for(let i=1;i<c.length;i++){let p=o[i-1];o.push(c[i]>c[i-1]?p+v[i]:c[i]<c[i-1]?p-v[i]:p)}return o}function vwapValue(h,l,c,v,n=80){let pv=0,vv=0;for(let i=Math.max(0,c.length-n);i<c.length;i++){let t=(h[i]+l[i]+c[i])/3;pv+=t*v[i];vv+=v[i]}return vv?pv/vv:last(c)}function cci(h,l,c,n=20){let tp=c.map((_,i)=>(h[i]+l[i]+c[i])/3),r=tp.slice(-n),ma=avg(r),md=avg(r.map(x=>Math.abs(x-ma)));return md?(last(tp)-ma)/(0.015*md):0}function mfi(h,l,c,v,n=14){let pos=0,neg=0;if(c.length<n+2)return 50;for(let i=c.length-n;i<c.length;i++){let tp=(h[i]+l[i]+c[i])/3,pr=(h[i-1]+l[i-1]+c[i-1])/3,flow=tp*v[i];if(tp>pr)pos+=flow;else if(tp<pr)neg+=flow}if(neg===0)return 100;return 100-(100/(1+pos/neg))}function williamsR(c,h,l,n=14){let hh=highest(h,n),ll=lowest(l,n);return hh-ll?((hh-last(c))/(hh-ll))*-100:-50}function adxValue(h,l,c,n=14){let pd=[],md=[],tr=[];for(let i=1;i<c.length;i++){let up=h[i]-h[i-1],dn=l[i-1]-l[i];pd.push(up>dn&&up>0?up:0);md.push(dn>up&&dn>0?dn:0);tr.push(Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1])))}let t=avg(tr.slice(-n));if(!t)return 0;let p=100*(avg(pd.slice(-n))/t),m=100*(avg(md.slice(-n))/t),dx=Math.abs(p-m)/(p+m)*100;return isFinite(dx)?dx:0}function donchian(h,l,n=20){let up=highest(h,n),lo=lowest(l,n);return{up,lo,mid:(up+lo)/2}}function keltner(c,at,n=20,m=1.5){let mid=last(ema(c,n));return{mid,up:mid+at*m,lo:mid-at*m}}
function fvgContext(h,l,c){let i=c.length-1;if(i<2)return{side:'info',msg:'FVG için yeterli mum yok'};if(l[i]>h[i-2])return{side:'long',msg:'Bullish FVG boşluğu var'};if(h[i]<l[i-2])return{side:'short',msg:'Bearish FVG boşluğu var'};return{side:'info',msg:'Net FVG yok'}}function sweepContext(h,l,c,res,sup){let i=c.length-1;if(l[i]<sup&&c[i]>sup)return{side:'long',msg:'Alt likidite süpürülüp destek üstü kapanış'};if(h[i]>res&&c[i]<res)return{side:'short',msg:'Üst likidite süpürülüp direnç altı kapanış'};return{side:'info',msg:'Net sweep yok'}}function bosChoch(c,res,sup,e21,e55){let p=last(c);if(p>res&&e21>e55)return{side:'long',msg:'Direnç üstü BOS'};if(p<sup&&e21<e55)return{side:'short',msg:'Destek altı BOS'};if(p>res&&e21<e55)return{side:'long',msg:'Yukarı CHOCH ihtimali'};if(p<sup&&e21>e55)return{side:'short',msg:'Aşağı CHOCH ihtimali'};return{side:'info',msg:'BOS/CHOCH teyidi yok'}}
function updateSelectedBox(){el('selectedBox').innerHTML=`${selected}<small>${listOpen?'Liste açık - seçim yapınca kapanır':'Liste kapalı - açmak için dokun'}</small>`}function toggleList(){listOpen=!listOpen;renderList()}function renderList(){updateSelectedBox();el('listPanel').classList.toggle('hidden',!listOpen);if(!listOpen){el('chips').innerHTML='';return}let q=el('search').value.toUpperCase().trim();let arr=symbols.filter(s=>!q||s.includes(q)||s.replace('USDT','').includes(q));el('chips').innerHTML=arr.map(s=>`<button class="chip ${s===selected?'active':''}" onclick="pick('${s}')">${s}</button>`).join('')}function pick(s){selected=s;listOpen=false;renderList();analyzeSelected()}function setTf(x){tf=x;document.querySelectorAll('.tf button').forEach(b=>b.classList.toggle('active',b.dataset.tf===tf));analyzeSelected()}
async function loadMarketData(force=false){try{el('dataStatus').textContent='data/market.json okunuyor...';let r=await fetch('data/market.json?ts='+(force?Date.now():Math.floor(Date.now()/60000)),{cache:'no-store'});if(!r.ok)throw Error('HTTP '+r.status);marketData=await r.json();if(!marketData.ok){show(`<div class="result warn">VERİ BEKLENİYOR</div><p>${marketData.message||'market.json henüz üretilmedi.'}</p><p class="notice">GitHub Actions sekmesinden <b>Update crypto market data</b> workflow’unu bir kez elle çalıştır. Sonra veri 5 dakikada bir yenilenir.</p>`);el('dataStatus').textContent='Veri henüz üretilmedi';return}symbols=marketData.symbols||symbols;if(!symbols.includes(selected))selected=symbols[0]||'BTCUSDT';let t=new Date(marketData.generatedAt).toLocaleString('tr-TR');el('dataStatus').textContent='Son veri: '+t;renderList();analyzeSelected()}catch(e){show(`<div class="result warn">VERİ DOSYASI HATASI</div><p>data/market.json okunamadı: ${e.message}</p><p class="notice">Dosyalar repo köküne doğru yüklendi mi kontrol et. GitHub Pages açıldığında data/market.json aynı repoda olmalı.</p>`);el('dataStatus').textContent='Veri dosyası okunamadı'}}
function addContext(name,fn,ctx,long,short,info){try{let r=fn();ctx.push({name,ok:true,side:r.side||'info',msg:r.msg||''});if(r.side==='long')long.push(`${name}: ${r.msg}`);else if(r.side==='short')short.push(`${name}: ${r.msg}`);else info.push(`${name}: ${r.msg}`)}catch(e){ctx.push({name,ok:false,side:'fail',msg:e.message||String(e)})}}
function getSelectedData(){if(!marketData||!marketData.ok)throw Error('Veri hazır değil');let row=marketData.markets&&marketData.markets[selected]&&marketData.markets[selected][tf];if(!row)throw Error(`${selected} / ${tf} verisi yok`);if(!row.ok) {let err=new Error(row.error||'Bu sembol/zaman dilimi başarısız');err.attempts=row.attempts||[];throw err}if(!row.candles||row.candles.length<80)throw Error('Mum sayısı yetersiz');return row}
function analyzeSelected(){try{let d=getSelectedData();calc(d)}catch(e){let attempts=e.attempts||[];show(`<div class="result warn">VERİ HATASI</div><p><b>${selected}</b> / <b>${tf}</b> için veri bulunamadı: ${e.message}</p>${attempts.map(a=>`<span class="badge ${a.ok?'good':'bad'}">${a.source}: ${a.ok?'ÇALIŞTI':'ÇALIŞMADI '+(a.error||'')}</span>`).join('')}<p class="notice">Actions verisi üretildiyse başka coin veya zaman dilimi dene. Hiç veri yoksa workflow’u çalıştır.</p>`)}}
function calc(data){let rows=data.candles,b=rows.map(x=>({time:x[0],open:x[1],high:x[2],low:x[3],close:x[4],volume:x[5]}));let o=b.map(x=>x.open),h=b.map(x=>x.high),l=b.map(x=>x.low),c=b.map(x=>x.close),v=b.map(x=>x.volume);let price=last(c),e9=last(ema(c,9)),e21=last(ema(c,21)),e55=last(ema(c,55)),e100=last(ema(c,100)),e200=last(ema(c,Math.min(200,c.length))),s20=last(sma(c,20)),s50=last(sma(c,50)),rs=rsi(c),mc=macd(c),sto=stoch(c,h,l),at=atr(h,l,c),rc=roc(c),bb=boll(c),adx=adxValue(h,l,c),cciVal=cci(h,l,c),mfiVal=mfi(h,l,c,v),willVal=williamsR(c,h,l),obvArr=obv(c,v),obvSlope=last(obvArr)-obvArr[Math.max(0,obvArr.length-10)],vwap=vwapValue(h,l,c,v,80),p=data.profile||marketData.tfProfiles?.[tf]||{sr:50,fib:180,am:1.6,rr:2.2,label:tfLabels[tf]||tf,ms:14400000};let srLen=Math.min(p.sr,c.length-5),fibLen=Math.min(p.fib,c.length-5),sup=lowest(l,srLen),res=highest(h,srLen),supF=lowest(l,fibLen),resF=highest(h,fibLen),dc=donchian(h,l,20),kc=keltner(c,at,20,1.5),volNow=last(v)||0,volAvg=avg(v.slice(-20))||1,fib382=resF-(resF-supF)*.382,fib618=resF-(resF-supF)*.618,body=Math.abs(last(c)-last(o)),range=Math.max(last(h)-last(l),.0000001),upper=last(h)-Math.max(last(o),last(c)),lower=Math.min(last(o),last(c))-last(l);let long=[],short=[],info=[],ctx=[];const add=(n,f)=>addContext(n,f,ctx,long,short,info);
add('1) Trend Rejimi',()=>e21>e55&&price>e100?{side:'long',msg:'Trend rejimi pozitif'}:e21<e55&&price<e100?{side:'short',msg:'Trend rejimi negatif'}:{side:'info',msg:'Trend karışık'});add('2) Trend Kırılımı',()=>price>res?{side:'long',msg:`${srLen} mum direnci kırıldı`}:price<sup?{side:'short',msg:`${srLen} mum desteği kırıldı`}:{side:'info',msg:'Kırılım yok'});add('3) BOS / CHOCH',()=>bosChoch(c,res,sup,e21,e55));add('4) EMA21',()=>price>e21?{side:'long',msg:'Fiyat EMA21 üstünde'}:{side:'short',msg:'Fiyat EMA21 altında'});add('5) EMA Dizilimi',()=>e9>e21&&e21>e55?{side:'long',msg:'EMA9 > EMA21 > EMA55'}:e9<e21&&e21<e55?{side:'short',msg:'EMA9 < EMA21 < EMA55'}:{side:'info',msg:'Dizilim karışık'});add('6) EMA200',()=>price>e200?{side:'long',msg:'Ana yapı güçlü'}:{side:'short',msg:'Ana yapı zayıf'});add('7) SMA20/50',()=>s20>s50?{side:'long',msg:'SMA20 > SMA50'}:{side:'short',msg:'SMA20 < SMA50'});add('8) ADX',()=>adx>25&&e21>e55?{side:'long',msg:'ADX güçlü yukarı'}:adx>25&&e21<e55?{side:'short',msg:'ADX güçlü aşağı'}:{side:'info',msg:'ADX zayıf/yatay'});add('9) MACD',()=>mc.hist>0?{side:'long',msg:'Histogram pozitif'}:{side:'short',msg:'Histogram negatif'});add('10) RSI',()=>rs>55?{side:'long',msg:'RSI güçlü'}:rs<45?{side:'short',msg:'RSI zayıf'}:{side:'info',msg:'RSI nötr'});add('11) Stochastic',()=>sto>60?{side:'long',msg:'Stoch güçlü'}:sto<40?{side:'short',msg:'Stoch zayıf'}:{side:'info',msg:'Stoch nötr'});add('12) ROC',()=>rc>0?{side:'long',msg:'Momentum pozitif'}:{side:'short',msg:'Momentum negatif'});add('13) CCI',()=>cciVal>100?{side:'long',msg:'CCI pozitif'}:cciVal<-100?{side:'short',msg:'CCI negatif'}:{side:'info',msg:'CCI nötr'});add('14) MFI',()=>mfiVal>55?{side:'long',msg:'Para akışı pozitif'}:mfiVal<45?{side:'short',msg:'Para akışı negatif'}:{side:'info',msg:'MFI nötr'});add('15) Williams %R',()=>willVal>-50?{side:'long',msg:'Üst bölge'}:{side:'short',msg:'Alt bölge'});add('16) Hacim',()=>volNow>volAvg*1.15?{side:'long',msg:'Hacim destekli'}:{side:'short',msg:'Hacim zayıf'});add('17) OBV',()=>obvSlope>0?{side:'long',msg:'OBV pozitif'}:{side:'short',msg:'OBV negatif'});add('18) VWAP',()=>price>vwap?{side:'long',msg:'VWAP üstü'}:{side:'short',msg:'VWAP altı'});add('19) Destek/Direnç',()=>price>res-at*.2?{side:'long',msg:'Direnç kırılım bölgesi'}:price<sup+at*.2?{side:'short',msg:'Destek tehlike'}:{side:'info',msg:'Aralıkta'});add('20) Donchian',()=>price>dc.mid?{side:'long',msg:'Kanal orta üstü'}:{side:'short',msg:'Kanal orta altı'});add('21) Bollinger',()=>price>bb.up?{side:'long',msg:'Üst bant kırılım'}:price<bb.lo?{side:'short',msg:'Alt bant baskı'}:price>bb.mid?{side:'long',msg:'Orta bant üstü'}:{side:'short',msg:'Orta bant altı'});add('22) Keltner',()=>price>kc.up?{side:'long',msg:'Üst kanal kırılım'}:price<kc.lo?{side:'short',msg:'Alt kanal baskı'}:{side:'info',msg:'Kanal içi'});add('23) Squeeze',()=>bb.width<3?{side:'info',msg:'Sıkışma'}:bb.width>8&&price>bb.mid?{side:'long',msg:'Volatilite yukarı'}:bb.width>8&&price<bb.mid?{side:'short',msg:'Volatilite aşağı'}:{side:'info',msg:'Normal volatilite'});add('24) Fibonacci',()=>price>fib382?{side:'long',msg:`0.382 üstü (${fibLen} mum)`}:price<fib618?{side:'short',msg:`0.618 altı (${fibLen} mum)`}:{side:'info',msg:'Orta bölge'});add('25) Liquidity Sweep',()=>sweepContext(h,l,c,res,sup));add('26) FVG',()=>fvgContext(h,l,c));add('27) Mum Fitili',()=>lower>body*2&&upper<body*1.2?{side:'long',msg:'Alt fitil tepki'}:upper>body*2&&lower<body*1.2?{side:'short',msg:'Üst fitil baskı'}:body/range<.15?{side:'info',msg:'Doji'}:last(c)>last(o)?{side:'long',msg:'Son mum yeşil'}:{side:'short',msg:'Son mum kırmızı'});add('28) 3 Mum',()=>c[c.length-1]>c[c.length-2]&&c[c.length-2]>c[c.length-3]?{side:'long',msg:'3 mum yukarı'}:c[c.length-1]<c[c.length-2]&&c[c.length-2]<c[c.length-3]?{side:'short',msg:'3 mum aşağı'}:{side:'info',msg:'Net değil'});
let worked=ctx.filter(x=>x.ok).length,failed=ctx.filter(x=>!x.ok).length,directional=long.length+short.length,decision=long.length>=short.length?'LONG':'SHORT',confidence=directional?Math.round(Math.max(long.length,short.length)/directional*100):50;confidence=Math.min(95,Math.max(35,confidence));let entry=price,stop=decision==='LONG'?Math.max(entry-at*p.am,sup-at*.1):Math.min(entry+at*p.am,res+at*.1),risk=Math.abs(entry-stop)||at*p.am,tp1=decision==='LONG'?entry+risk:entry-risk,tp2=decision==='LONG'?entry+risk*p.rr:entry-risk*p.rr,tp3=decision==='LONG'?entry+risk*(p.rr+1):entry-risk*(p.rr+1);drawChart(c,entry,stop,tp2);let lastTime=new Date(last(b).time).toLocaleString('tr-TR'),genTime=marketData?.generatedAt?new Date(marketData.generatedAt).toLocaleString('tr-TR'):'-';show(`<div class="result ${decision==='LONG'?'long':'short'}">${decision}</div><div class="kpi"><div>Sembol<b>${selected}</b></div><div>Time Frame<b>${tf}</b></div><div>TF Kontrol<b>${p.label||tfLabels[tf]||tf}</b></div><div>Mum Aralığı<b>${Math.round((data.realMs||p.ms)/60000)} dk</b></div><div>Kaynak<b>${data.source}</b></div><div>JSON Güncelleme<b>${genTime}</b></div><div>Son Mum<b>${lastTime}</b></div><div>Güven<b>%${confidence}</b></div><div>Fiyat<b>${fmt(price)}</b></div><div>Giriş<b>${fmt(entry)}</b></div><div>Stop<b>${fmt(stop)}</b></div><div>Hedef 1<b>${fmt(tp1)}</b></div><div>Hedef 2<b>${fmt(tp2)}</b></div><div>Hedef 3<b>${fmt(tp3)}</b></div><div>ATR<b>${fmt(at)}</b></div><div>Hedef R/R<b>${p.rr}R</b></div></div><p><b>Veri bağı:</b>${(data.attempts||[]).map(a=>`<span class="badge ${a.ok?'good':'bad'}">${a.source}: ${a.ok?'ÇALIŞTI':'ÇALIŞMADI '+(a.error||'')}</span>`).join('')}</p><p><b>Çalışan bağlam:</b> ${worked}<span class="badge good">ÇALIŞTI</span> <b>Çalışmayan bağlam:</b> ${failed}<span class="badge ${failed?'bad':'good'}">${failed}</span></p><p class="notice">Veri dış API’den değil, repo içindeki data/market.json dosyasından okunur. Her time frame kendi mum verisiyle ayrı ATR, stop ve hedef üretir.</p><p><b>LONG sebepleri:</b><br>${long.map(x=>`<span class="badge good">${x}</span>`).join('')}</p><p><b>SHORT sebepleri:</b><br>${short.map(x=>`<span class="badge bad">${x}</span>`).join('')}</p><p><b>Nötr / Bilgi:</b><br>${info.map(x=>`<span class="badge info">${x}</span>`).join('')}</p><p><b>Çalışan analiz bağları:</b><br>${ctx.filter(x=>x.ok).map(x=>`<span class="badge info">${x.name}</span>`).join('')}</p>`)}
function drawChart(c,entry,stop,tp){let canvas=el('chart'),ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);ctx.fillStyle='#0f1528';ctx.fillRect(0,0,w,h);let arr=c.slice(-100),min=Math.min(...arr,entry,stop,tp),max=Math.max(...arr,entry,stop,tp),pad=(max-min)*.08||1;min-=pad;max+=pad;let y=v=>h-22-(v-min)/(max-min)*(h-44),x=i=>22+i/(arr.length-1)*(w-44);ctx.strokeStyle='#7aa2ff';ctx.lineWidth=2;ctx.beginPath();arr.forEach((v,i)=>i?ctx.lineTo(x(i),y(v)):ctx.moveTo(x(i),y(v)));ctx.stroke();function line(v,color,name){ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(20,y(v));ctx.lineTo(w-20,y(v));ctx.stroke();ctx.fillStyle=color;ctx.font='13px Arial';ctx.fillText(name+' '+fmt(v),24,y(v)-5)}line(entry,'#ffd166','Giriş');line(stop,'#ff6b7a','Stop');line(tp,'#2cff9a','Hedef')}renderList();loadMarketData();
