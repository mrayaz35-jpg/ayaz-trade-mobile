<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ayaz Trade Crypto Pro</title>

<style>
:root{
  --bg:#0b1020;
  --card:#151b33;
  --line:#2b355f;
  --mut:#aeb8d8;
  --blue:#2f7cff;
  --green:#2cff9a;

}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}
.wrap{
  max-width:880px;
  margin:auto;
  padding:14px 12px 70px;
}
h1{
  font-size:24px;
  margin:8px 0 4px;
}
p{
  color:var(--mut);
  line-height:1.35;
}
.small{
  font-size:13px;
  color:#9da8c9;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin:10px 0;
}
.selectedBox{
  width:100%;
  background:#0f1528;
  border:1px solid var(--yel);
  color:white;
  border-radius:16px;
  padding:14px;
  font-size:20px;
  font-weight:900;

}

  display:block;
  color:#aeb8d8;
  font-size:13px;
  font-weight:500;
  margin-top:3px;
}
.hidden{display:none}
.search{
  width:100%;
  border-radius:13px;
  border:1px solid #344064;
  background:#0f1528;
  color:white;
  padding:12px;
  margin:8px 0;
  font-size:16px;
}
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  max-height:170px;
  overflow:auto;
}
.chip{
  white-space:nowrap;
  background:#0f1528;
  border:1px solid #344064;
  color:white;
  border-radius:999px;
  padding:8px 11px;
  font-size:14px;
  font-weight:800;
}
.chip.active{
  background:#3a2d09;
  border-color:var(--yel);
}
.tf{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
  margin:8px 0;
}
.tf button{
  background:#0f1528;
  border:1px solid #344064;
  color:white;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
}
.tf button.active{
  background:var(--blue);
}
.result{
  font-size:42px;
  font-weight:900;
  text-align:center;
  padding:18px;
  border-radius:18px;
  margin:10px 0;
}
.long{
  background:#073d2a;
  color:var(--green);
}
.short{
  background:#47151d;
  color:var(--red);
}
.warn{
  background:#3a2d09;
  color:var(--yel);
}
.kpi{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.kpi div{
  background:#0f1528;
  border:1px solid #344064;
  border-radius:14px;
  padding:10px;
  color:#c8d1f2;
}
.kpi b{
  display:block;
  color:white;
  font-size:17px;
  margin-top:4px;
}
.badge{
  display:inline-block;
  padding:7px 10px;
  border-radius:999px;
  margin:4px;
  font-size:13px;
}
.good{
  background:#063922;
  color:#88ffc7;
}
.bad{
  background:#451721;
  color:#ff9aa7;
}
.info{
  background:#24304f;
  color:#dce4ff;
}
.notice{
  border-left:4px solid var(--yel);
  padding-left:10px;
  color:#dce4ff;
}
canvas{
  width:100%;
  height:180px;
  background:#0f1528;
  border:1px solid #344064;
  border-radius:14px;
}
@media(max-width:560px){
  .kpi{grid-template-columns:1fr}
  .result{font-size:36px}
}
</style>
</head>

<body>
<div class="wrap">

<h1>Ayaz Trade Crypto Pro</h1>
<div class="small">Sadece kripto. Veri sırası: KuCoin → OKX → CryptoCompare. Liste seçimden sonra kapanır.</div>

<div class="card">
  <button id="selectedBox" class="selectedBox" onclick="toggleList()">
    BTCUSDT
    <small>Liste kapalı - açmak için dokun</small>

    <input id="search" class="search" placeholder="Ara: BTC, ETH, SOL, AVAX..." oninput="renderList()">

  <div class="tf">
    <button onclick="setTf('5m')" data-tf="5m">5D</button>
    <button onclick="setTf('15m')" data-tf="15m">15D</button>
    <button onclick="setTf('30m')" data-tf="30m">30D</button>
    <button onclick="setTf('1h')" data-tf="1h">1S</button>
    <button onclick="setTf('2h')" data-tf="2h">2S</button>
    <button onclick="setTf('4h')" data-tf="4h" class="active">4S</button>
    <button onclick="setTf('8h')" data-tf="8h">8S</button>

    <button onclick="setTf('1d')" data-tf="1d">1G</button>
  </div>
</div>

<div id="out" class="card">
  <p>Kripto analiz yükleniyor...</p>
</div>

<div class="card">
  <canvas id="chart" width="760" height="230"></canvas>
</div>

</div>

<script>
let selected="BTCUSDT";
let tf="4h";
let listOpen=false;

const CRYPTOS=[
"BTC","ETH","BNB","SOL","XRP","DOGE","ADA","AVAX","LINK","DOT","TRX","MATIC","LTC","BCH","ATOM",
"NEAR","APT","OP","ARB","INJ","FIL","ETC","SUI","SEI","TIA","RUNE","AAVE","UNI","MKR","FET",
"RENDER","RNDR","GRT","PEPE","SHIB","WIF","BONK","FLOKI","TON","HBAR","ICP","XLM","VET","ALGO",
"EGLD","FTM","SAND","MANA","AXS","GALA","IMX","LDO","CRV","SUSHI","COMP","SNX","DYDX","JUP",
"PYTH","WLD","AR","STX","KAS","ORDI","ENA","PENDLE","JASMY","STRK","ZK","ZRO","TAO","THETA",
"QNT","KAVA","ROSE","MINA","FLOW","CHZ","APE","BLUR","GMT","WOO","1INCH","ENS","ZIL","IOTA",
"KSM","CELO","BAT","QTUM","DASH","ZEC","XMR","WAVES","HOT","ANKR","SKL","LRC","API3","MASK",
"YFI","BAL","KNC","BAND","RLC","CTSI","STORJ","CFX","CKB","ONE","ONT","ICX","RVN","IOST",
"CELR","CHR","COTI","ALICE","TLM","BAKE","CAKE","RAY","LPT","GMX","FXS","CVX","TWT","SFP",
"HOOK","MAGIC","HIGH","ID","EDU","CYBER","NTRN","MEME","ALT","AEVO","ETHFI","W"
];

const items=CRYPTOS.map(s=>[s+"USDT",s]);

function el(id){return document.getElementById(id)}
function show(x){el("out").innerHTML=x}
function last(a){return a[a.length-1]}
function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function std(a){let m=avg(a);return Math.sqrt(avg(a.map(x=>(x-m)*(x-m))))||0}
function fmt(v,d=4){return Number(v).toLocaleString("tr-TR",{maximumFractionDigits:d})}

function ema(a,n){
  let k=2/(n+1),r=[],e=a[0];
  for(let v of a){e=v*k+e*(1-k);r.push(e)}
  return r;
}

function sma(a,n){
  return a.map((_,i)=>avg(a.slice(Math.max(0,i-n+1),i+1)));
}

function rsi(a,n=14){
  if(a.length<n+2)return 50;
  let g=0,l=0;
  for(let i=a.length-n;i<a.length;i++){
    let d=a[i]-a[i-1];
    if(d>0)g+=d; else l-=d;
  }
  if(l===0)return 100;
  let rs=g/l;
  return 100-100/(1+rs);
}

function macd(a){
  let e12=ema(a,12);
  let e26=ema(a,26);
  let m=e12.map((v,i)=>v-e26[i]);
  let s=ema(m,9);
  return {hist:last(m)-last(s)};
}

function atr(h,l,c,n=14){
  let tr=[];
  for(let i=1;i<c.length;i++){
    tr.push(Math.max(
      h[i]-l[i],
      Math.abs(h[i]-c[i-1]),
      Math.abs(l[i]-c[i-1])
    ));
  }
  return avg(tr.slice(-n))||0;
}

function stoch(c,h,l,n=14){
  let hi=Math.max(...h.slice(-n));
  let lo=Math.min(...l.slice(-n));
  let d=hi-lo;
  return d?((last(c)-lo)/d)*100:50;
}

function roc(c,n=10){
  return c.length>n?((last(c)-c[c.length-1-n])/c[c.length-1-n])*100:0;
}

function boll(c,n=20,m=2){
  let s=c.slice(-n);
  let mid=avg(s);
  let sd=std(s);
  return {
    mid,
    up:mid+m*sd,
    lo:mid-m*sd,
    width:mid?((m*sd*2)/mid)*100:0
  };
}

function highest(a,n){return Math.max(...a.slice(-n))}
function lowest(a,n){return Math.min(...a.slice(-n))}

function obv(c,v){
  let o=[0];
  for(let i=1;i<c.length;i++){
    let p=o[i-1];
    if(c[i]>c[i-1])o.push(p+v[i]);
    else if(c[i]<c[i-1])o.push(p-v[i]);
    else o.push(p);
  }
  return o;
}

function vwapValue(h,l,c,v,n=80){
  let pv=0,vv=0;
  for(let i=Math.max(0,c.length-n);i<c.length;i++){
    let t=(h[i]+l[i]+c[i])/3;
    pv+=t*v[i];
    vv+=v[i];
  }
  return vv?pv/vv:last(c);
}

function cci(h,l,c,n=20){
  let tp=c.map((_,i)=>(h[i]+l[i]+c[i])/3);
  let r=tp.slice(-n);
  let ma=avg(r);
  let md=avg(r.map(x=>Math.abs(x-ma)));
  return md?(last(tp)-ma)/(0.015*md):0;
}

function mfi(h,l,c,v,n=14){
  let pos=0,neg=0;
  for(let i=c.length-n;i<c.length;i++){
    let tp=(h[i]+l[i]+c[i])/3;
    let pr=(h[i-1]+l[i-1]+c[i-1])/3;
    let flow=tp*v[i];
    if(tp>pr)pos+=flow;
    else if(tp<pr)neg+=flow;
  }
  if(neg===0)return 100;
  return 100-(100/(1+pos/neg));
}

function williamsR(c,h,l,n=14){
  let hh=highest(h,n);
  let ll=lowest(l,n);
  return hh-ll?((hh-last(c))/(hh-ll))*-100:-50;
}

function adxValue(h,l,c,n=14){
  let pd=[],md=[],tr=[];
  for(let i=1;i<c.length;i++){
    let up=h[i]-h[i-1];
    let dn=l[i-1]-l[i];
    pd.push(up>dn&&up>0?up:0);
    md.push(dn>up&&dn>0?dn:0);
    tr.push(Math.max(
      h[i]-l[i],
      Math.abs(h[i]-c[i-1]),
      Math.abs(l[i]-c[i-1])
    ));
  }
  let t=avg(tr.slice(-n));
  if(!t)return 0;
  let p=100*(avg(pd.slice(-n))/t);
  let m=100*(avg(md.slice(-n))/t);
  let dx=Math.abs(p-m)/(p+m)*100;
  return isFinite(dx)?dx:0;
}

function donchian(h,l,n=20){
  let up=highest(h,n);
  let lo=lowest(l,n);
  return {up,lo,mid:(up+lo)/2};
}

function keltner(c,at,n=20,m=1.5){
  let mid=last(ema(c,n));
  return {mid,up:mid+at*m,lo:mid-at*m};
}

function tfProfile(x){
  const m={
    "5m":{ku:"5min",ok:"5m",cc:"histominute",ccAgg:5,okAgg:1,sr:48,fib:120,am:1.1,rr:1.4,label:"5 dakika",ms:5*60*1000},
    "15m":{ku:"15min",ok:"15m",cc:"histominute",ccAgg:15,okAgg:1,sr:48,fib:120,am:1.2,rr:1.5,label:"15 dakika",ms:15*60*1000},
    "30m":{ku:"30min",ok:"30m",cc:"histominute",ccAgg:30,okAgg:1,sr:48,fib:120,am:1.3,rr:1.6,label:"30 dakika",ms:30*60*1000},
    "1h":{ku:"1hour",ok:"1H",cc:"histohour",ccAgg:1,okAgg:1,sr:48,fib:160,am:1.4,rr:1.8,label:"1 saat",ms:60*60*1000},
    "2h":{ku:"2hour",ok:"2H",cc:"histohour",ccAgg:2,okAgg:1,sr:48,fib:160,am:1.5,rr:2,label:"2 saat",ms:2*60*60*1000},
    "4h":{ku:"4hour",ok:"4H",cc:"histohour",ccAgg:4,okAgg:1,sr:50,fib:180,am:1.6,rr:2.2,label:"4 saat",ms:4*60*60*1000},
    "8h":{ku:"8hour",ok:"4H",cc:"histohour",ccAgg:8,okAgg:2,sr:60,fib:200,am:1.8,rr:2.5,label:"8 saat",ms:8*60*60*1000},
    "16h":{ku:"8hour",ok:"4H",cc:"histohour",ccAgg:16,okAgg:4,sr:60,fib:200,am:2,rr:2.8,label:"16 saat",ms:16*60*60*1000},
    "1d":{ku:"1day",ok:"1D",cc:"histoday",ccAgg:1,okAgg:1,sr:80,fib:240,am:2.2,rr:3,label:"1 gün",ms:24*60*60*1000}
  };
  return m[x]||m["4h"];
}

function fvgContext(h,l,c){
  let i=c.length-1;
  if(i<2)return {side:"info",msg:"FVG için yeterli mum yok"};
  if(l[i]>h[i-2])return {side:"long",msg:"Bullish FVG boşluğu var"};
  if(h[i]<l[i-2])return {side:"short",msg:"Bearish FVG boşluğu var"};
  return {side:"info",msg:"Net FVG yok"};
}

function sweepContext(h,l,c,res,sup){
  let i=c.length-1;
  if(l[i]<sup&&c[i]>sup)return {side:"long",msg:"Alt likidite süpürülüp destek üstü kapanış"};
  if(h[i]>res&&c[i]<res)return {side:"short",msg:"Üst likidite süpürülüp direnç altı kapanış"};
  return {side:"info",msg:"Net sweep yok"};
}

function bosChoch(c,res,sup,e21,e55){
  let p=last(c);
  if(p>res&&e21>e55)return {side:"long",msg:"Direnç üstü BOS"};
  if(p<sup&&e21<e55)return {side:"short",msg:"Destek altı BOS"};
  if(p>res&&e21<e55)return {side:"long",msg:"Yukarı CHOCH ihtimali"};
  if(p<sup&&e21>e55)return {side:"short",msg:"Aşağı CHOCH ihtimali"};
  return {side:"info",msg:"BOS/CHOCH teyidi yok"};
}

function updateSelectedBox(){
  el("selectedBox").innerHTML=
    `${selected}<small>${listOpen?"Liste açık - seçim yapınca kapanır":"Liste kapalı - açmak için dokun"}</small>`;
}

function toggleList(){
  listOpen=!listOpen;
  renderList();
}

function renderList(){
  updateSelectedBox();
  el("listPanel").classList.toggle("hidden",!listOpen);

  if(!listOpen){
    el("chips").innerHTML="";
    return;
  }

  let q=el("search").value.toUpperCase().trim();

  let arr=items.filter(x=>
    !q ||
    x[0].includes(q) ||
    x[1].includes(q)
  );

  el("chips").innerHTML=arr.map(x=>
    `<button class="chip ${x[0]===selected?'active':''}" onclick="pick('${x[0]}')">${x[0]}</button>`
  ).join("");
}

function pick(s){
  selected=s;
  listOpen=false;
  renderList();
  analyzeSelected();
}

function setTf(x){
  tf=x;
  document.querySelectorAll(".tf button").forEach(b=>{
    b.classList.toggle("active",b.dataset.tf===tf);
  });
  analyzeSelected();
}

async function fetchJSON(url,ms=12000){
  let ctrl=new AbortController();
  let t=setTimeout(()=>ctrl.abort(),ms);

  try{
    let r=await fetch(url,{signal:ctrl.signal,cache:"no-store"});
    if(!r.ok)throw Error("HTTP "+r.status);
    return await r.json();
  }finally{
    clearTimeout(t);
  }
}

function baseFromSymbol(s){
  return s.replace(/USDT$/,"").replace(/USD$/,"");
}

function aggregateBars(b,n){
  if(n<=1)return b;

  let out=[];

  for(let i=0;i+n<=b.length;i+=n){
    let g=b.slice(i,i+n);

    out.push({
      openTime:g[0].openTime,
      open:g[0].open,
      high:Math.max(...g.map(x=>x.high)),
      low:Math.min(...g.map(x=>x.low)),
      close:last(g).close,
      volume:g.reduce((a,x)=>a+x.volume,0),
      closeTime:last(g).closeTime
    });
  }

  return out;
}

async function barsKuCoin(base,p,attempts){
  let sym=`${base}-USDT`;
  let url=`https://api.kucoin.com/api/v1/market/candles?type=${p.ku}&symbol=${sym}&_=${Date.now()}`;

  try{
    let j=await fetchJSON(url);

    if(j.code!=="200000"){
      throw Error(j.msg||"KuCoin hata");
    }

    let arr=j.data;

    if(!Array.isArray(arr)||arr.length<80){
      throw Error("Yetersiz veri");
    }

    let bars=arr.map(x=>({
      openTime:+x[0]*1000,
      open:+x[1],
      close:+x[2],
      high:+x[3],
      low:+x[4],
      volume:+x[5],
      closeTime:+x[0]*1000+p.ms-1
    }))
    .sort((a,b)=>a.openTime-b.openTime)
    .filter(x=>x.close>0&&x.high>0&&x.low>0)
    .slice(-300);

    if(bars.length<80){
      throw Error("Temiz veri yetersiz");
    }

    attempts.push({source:"KuCoin",ok:true});

    return {
      bars,
      source:"KuCoin",
      attempts
    };
  }catch(e){
    attempts.push({source:"KuCoin",ok:false,error:e.message||String(e)});
    throw e;
  }
}

async function barsOKX(base,p,attempts){
  let inst=`${base}-USDT`;
  let url=`https://www.okx.com/api/v5/market/candles?instId=${inst}&bar=${p.ok}&limit=300&_=${Date.now()}`;

  try{
    let j=await fetchJSON(url);

    if(j.code!=="0"){
      throw Error(j.msg||"OKX hata");
    }

    let arr=j.data;

    if(!Array.isArray(arr)||arr.length<80){
      throw Error("Yetersiz veri");
    }

    let bars=arr.map(x=>({
      openTime:+x[0],
      open:+x[1],
      high:+x[2],
      low:+x[3],
      close:+x[4],
      volume:+x[5],
      closeTime:+x[0]+p.ms-1
    }))
    .sort((a,b)=>a.openTime-b.openTime)
    .filter(x=>x.close>0&&x.high>0&&x.low>0);

    bars=aggregateBars(bars,p.okAgg).slice(-300);

    if(bars.length<80){
      throw Error("Temiz veri yetersiz");
    }

    attempts.push({
      source:p.okAgg>1?`OKX ${p.ok} aggregate`:"OKX",
      ok:true
    });

    return {
      bars,
      source:p.okAgg>1?`OKX ${p.ok} aggregate`:"OKX",
      attempts
    };
  }catch(e){
    attempts.push({source:"OKX",ok:false,error:e.message||String(e)});
    throw e;
  }
}

async function barsCryptoCompare(base,p,attempts){
  let urls=[
    {
      source:"CryptoCompare USDT",
      url:`https://min-api.cryptocompare.com/data/v2/${p.cc}?fsym=${base}&tsym=USDT&limit=320&aggregate=${p.ccAgg}&_=${Date.now()}`
    },
    {
      source:"CryptoCompare USD",
      url:`https://min-api.cryptocompare.com/data/v2/${p.cc}?fsym=${base}&tsym=USD&limit=320&aggregate=${p.ccAgg}&_=${Date.now()}`
    }
  ];

  for(let u of urls){
    try{
      let j=await fetchJSON(u.url);

      if(j.Response==="Error"){
        throw Error(j.Message||"API error");
      }

      let arr=j.Data&&j.Data.Data;

      if(!Array.isArray(arr)||arr.length<80){
        throw Error("Yetersiz veri");
      }

      let bars=arr.map(x=>({
        openTime:x.time*1000,
        open:+x.open,
        high:+x.high,
        low:+x.low,
        close:+x.close,
        volume:+(x.volumefrom||x.volumeto||0),
        closeTime:x.time*1000+p.ms-1
      }))
      .filter(x=>x.close>0&&x.high>0&&x.low>0)
      .slice(-300);

      if(bars.length<80){
        throw Error("Temiz veri yetersiz");
      }

      attempts.push({source:u.source,ok:true});

      return {
        bars,
        source:u.source,
        attempts
      };
    }catch(e){
      attempts.push({source:u.source,ok:false,error:e.message||String(e)});
    }
  }

  throw Error("CryptoCompare veri vermedi");
}

async function getBars(sym){
  let p=tfProfile(tf);
  let base=baseFromSymbol(sym);
  let attempts=[];
  let r=null;

  try{
    r=await barsKuCoin(base,p,attempts);
  }catch(e1){
    try{
      r=await barsOKX(base,p,attempts);
    }catch(e2){
      try{
        r=await barsCryptoCompare(base,p,attempts);
      }catch(e3){
        let err=new Error("KuCoin / OKX / CryptoCompare veri vermedi");
        err.attempts=attempts;
        throw err;
      }
    }
  }

  let real=r.bars.length>2
    ? r.bars[r.bars.length-1].openTime-r.bars[r.bars.length-2].openTime
    : 0;

  return {
    source:r.source,
    symbol:sym,
    tf,
    tfLabel:p.label,
    realMs:real,
    bars:r.bars,
    profile:p,
    attempts
  };
}

async function analyzeSelected(){
  show(`<p>Veri çekiliyor: <b>${selected}</b> / <b>${tf}</b></p>`);

  try{
    let d=await getBars(selected);
    calc(d);
  }catch(e){
    let attempts=e.attempts||[];

    show(`
      <div class="result warn">VERİ HATASI</div>
      <p><b>${selected}</b> için KuCoin / OKX / CryptoCompare kanallarından veri alınamadı.</p>
      ${attempts.map(a=>
        `<span class="badge ${a.ok?'good':'bad'}">${a.source}: ${a.ok?"ÇALIŞTI":"ÇALIŞMADI "+(a.error||"")}</span>`
      ).join("")}
      <p class="notice">Başka coin veya farklı zaman dilimi dene.</p>
    `);
  }
}

function addContext(name,fn,ctx,long,short,info){
  try{
    let r=fn();

    ctx.push({
      name,
      ok:true,
      side:r.side||"info",
      msg:r.msg||""
    });

    if(r.side==="long")long.push(`${name}: ${r.msg}`);
    else if(r.side==="short")short.push(`${name}: ${r.msg}`);
    else info.push(`${name}: ${r.msg}`);
  }catch(e){
    ctx.push({
      name,
      ok:false,
      side:"fail",
      msg:e.message||String(e)
    });
  }
}

function calc(data){
  let b=data.bars;

  let o=b.map(x=>x.open);
  let h=b.map(x=>x.high);
  let l=b.map(x=>x.low);
  let c=b.map(x=>x.close);
  let v=b.map(x=>x.volume);

  let price=last(c);

  let e9=last(ema(c,9));
  let e21=last(ema(c,21));
  let e55=last(ema(c,55));
  let e100=last(ema(c,100));
  let e200=last(ema(c,Math.min(200,c.length)));

  let s20=last(sma(c,20));
  let s50=last(sma(c,50));

  let rs=rsi(c);
  let mc=macd(c);
  let sto=stoch(c,h,l);
  let at=atr(h,l,c);
  let rc=roc(c);
  let bb=boll(c);
  let adx=adxValue(h,l,c);
  let cciVal=cci(h,l,c);
  let mfiVal=mfi(h,l,c,v);
  let willVal=williamsR(c,h,l);

  let obvArr=obv(c,v);
  let obvSlope=last(obvArr)-obvArr[obvArr.length-10];

  let vwap=vwapValue(h,l,c,v,80);

  let p=data.profile;

  let srLen=Math.min(p.sr,c.length-5);
  let fibLen=Math.min(p.fib,c.length-5);

  let sup=lowest(l,srLen);
  let res=highest(h,srLen);

  let supF=lowest(l,fibLen);
  let resF=highest(h,fibLen);

  let dc=donchian(h,l,20);
  let kc=keltner(c,at,20,1.5);

  let volNow=last(v)||0;
  let volAvg=avg(v.slice(-20))||1;

  let fib382=resF-(resF-supF)*0.382;
  let fib618=resF-(resF-supF)*0.618;

  let body=Math.abs(last(c)-last(o));
  let range=Math.max(last(h)-last(l),0.0000001);
  let upper=last(h)-Math.max(last(o),last(c));
  let lower=Math.min(last(o),last(c))-last(l);

  let long=[];
  let short=[];
  let info=[];
  let ctx=[];

  const add=(n,f)=>addContext(n,f,ctx,long,short,info);

  add("1) Trend Rejimi",()=>e21>e55&&price>e100
    ?{side:"long",msg:"Trend rejimi pozitif"}
    :e21<e55&&price<e100
      ?{side:"short",msg:"Trend rejimi negatif"}
      :{side:"info",msg:"Trend karışık"});

  add("2) Trend Kırılımı",()=>price>res
    ?{side:"long",msg:`${srLen} mum direnci kırıldı`}
    :price<sup
      ?{side:"short",msg:`${srLen} mum desteği kırıldı`}
      :{side:"info",msg:"Kırılım yok"});

  add("3) BOS / CHOCH",()=>bosChoch(c,res,sup,e21,e55));

  add("4) EMA21",()=>price>e21
    ?{side:"long",msg:"Fiyat EMA21 üstünde"}
    :{side:"short",msg:"Fiyat EMA21 altında"});

  add("5) EMA Dizilimi",()=>e9>e21&&e21>e55
    ?{side:"long",msg:"EMA9 > EMA21 > EMA55"}
    :e9<e21&&e21<e55
      ?{side:"short",msg:"EMA9 < EMA21 < EMA55"}
      :{side:"info",msg:"Dizilim karışık"});

  add("6) EMA200",()=>price>e200
    ?{side:"long",msg:"Ana yapı güçlü"}
    :{side:"short",msg:"Ana yapı zayıf"});

  add("7) SMA20/50",()=>s20>s50
    ?{side:"long",msg:"SMA20 > SMA50"}
    :{side:"short",msg:"SMA20 < SMA50"});

  add("8) ADX",()=>adx>25&&e21>e55
    ?{side:"long",msg:"ADX güçlü yukarı"}
    :adx>25&&e21<e55
      ?{side:"short",msg:"ADX güçlü aşağı"}
      :{side:"info",msg:"ADX zayıf/yatay"});

  add("9) MACD",()=>mc.hist>0
    ?{side:"long",msg:"Histogram pozitif"}
    :{side:"short",msg:"Histogram negatif"});

  add("10) RSI",()=>rs>55
    ?{side:"long",msg:"RSI güçlü"}
    :rs<45
      ?{side:"short",msg:"RSI zayıf"}
      :{side:"info",msg:"RSI nötr"});

  add("11) Stochastic",()=>sto>60
    ?{side:"long",msg:"Stoch güçlü"}
    :sto<40
      ?{side:"short",msg:"Stoch zayıf"}
      :{side:"info",msg:"Stoch nötr"});

  add("12) ROC",()=>rc>0
    ?{side:"long",msg:"Momentum pozitif"}
    :{side:"short",msg:"Momentum negatif"});

  add("13) CCI",()=>cciVal>100
    ?{side:"long",msg:"CCI pozitif"}
    :cciVal<-100
      ?{side:"short",msg:"CCI negatif"}
      :{side:"info",msg:"CCI nötr"});

  add("14) MFI",()=>mfiVal>55
    ?{side:"long",msg:"Para akışı pozitif"}
    :mfiVal<45
      ?{side:"short",msg:"Para akışı negatif"}
      :{side:"info",msg:"MFI nötr"});

  add("15) Williams %R",()=>willVal>-50
    ?{side:"long",msg:"Üst bölge"}
    :{side:"short",msg:"Alt bölge"});

  add("16) Hacim",()=>volNow>volAvg*1.15
    ?{side:"long",msg:"Hacim destekli"}
    :{side:"short",msg:"Hacim zayıf"});

  add("17) OBV",()=>obvSlope>0
    ?{side:"long",msg:"OBV pozitif"}
    :{side:"short",msg:"OBV negatif"});

  add("18) VWAP",()=>price>vwap
    ?{side:"long",msg:"VWAP üstü"}
    :{side:"short",msg:"VWAP altı"});

  add("19) Destek/Direnç",()=>price>res-at*0.2
    ?{side:"long",msg:"Direnç kırılım bölgesi"}
    :price<sup+at*0.2
      ?{side:"short",msg:"Destek tehlike"}
      :{side:"info",msg:"Aralıkta"});

  add("20) Donchian",()=>price>dc.mid
    ?{side:"long",msg:"Kanal orta üstü"}
    :{side:"short",msg:"Kanal orta altı"});

  add("21) Bollinger",()=>price>bb.up
    ?{side:"long",msg:"Üst bant kırılım"}
    :price<bb.lo
      ?{side:"short",msg:"Alt bant baskı"}
      :price>bb.mid
        ?{side:"long",msg:"Orta bant üstü"}
        :{side:"short",msg:"Orta bant altı"});

  add("22) Keltner",()=>price>kc.up
    ?{side:"long",msg:"Üst kanal kırılım"}
    :price<kc.lo
      ?{side:"short",msg:"Alt kanal baskı"}
      :{side:"info",msg:"Kanal içi"});

  add("23) Squeeze",()=>bb.width<3
    ?{side:"info",msg:"Sıkışma"}
    :bb.width>8&&price>bb.mid
      ?{side:"long",msg:"Volatilite yukarı"}
      :bb.width>8&&price<bb.mid
        ?{side:"short",msg:"Volatilite aşağı"}
        :{side:"info",msg:"Normal volatilite"});

  add("24) Fibonacci",()=>price>fib382
    ?{side:"long",msg:`0.382 üstü (${fibLen} mum)`}
    :price<fib618
      ?{side:"short",msg:`0.618 altı (${fibLen} mum)`}
      :{side:"info",msg:"Orta bölge"});

  add("25) Liquidity Sweep",()=>sweepContext(h,l,c,res,sup));

  add("26) FVG",()=>fvgContext(h,l,c));

  add("27) Mum Fitili",()=>lower>body*2&&upper<body*1.2
    ?{side:"long",msg:"Alt fitil tepki"}
    :upper>body*2&&lower<body*1.2
      ?{side:"short",msg:"Üst fitil baskı"}
      :body/range<0.15
        ?{side:"info",msg:"Doji"}
        :last(c)>last(o)
          ?{side:"long",msg:"Son mum yeşil"}
          :{side:"short",msg:"Son mum kırmızı"});

  add("28) 3 Mum",()=>c[c.length-1]>c[c.length-2]&&c[c.length-2]>c[c.length-3]
    ?{side:"long",msg:"3 mum yukarı"}
    :c[c.length-1]<c[c.length-2]&&c[c.length-2]<c[c.length-3]
      ?{side:"short",msg:"3 mum aşağı"}
      :{side:"info",msg:"Net değil"});

  let worked=ctx.filter(x=>x.ok).length;
  let failed=ctx.filter(x=>!x.ok).length;

  let directional=long.length+short.length;
  let decision=long.length>=short.length?"LONG":"SHORT";

  let confidence=directional
    ? Math.round(Math.max(long.length,short.length)/directional*100)
    : 50;

  confidence=Math.min(95,Math.max(35,confidence));

  let entry=price;

  let stop=decision==="LONG"
    ? Math.max(entry-at*p.am,sup-at*0.1)
    : Math.min(entry+at*p.am,res+at*0.1);

  let risk=Math.abs(entry-stop)||at*p.am;

  let tp1=decision==="LONG"?entry+risk:entry-risk;
  let tp2=decision==="LONG"?entry+risk*p.rr:entry-risk*p.rr;
  let tp3=decision==="LONG"?entry+risk*(p.rr+1):entry-risk*(p.rr+1);

  drawChart(c,entry,stop,tp2);

  let lastTime=new Date(last(b).closeTime).toLocaleString("tr-TR");

  show(`
    <div class="result ${decision==="LONG"?"long":"short"}">${decision}</div>

    <div class="kpi">
      <div>Sembol<b>${data.symbol}</b></div>
      <div>Time Frame<b>${tf}</b></div>
      <div>TF Kontrol<b>${data.tfLabel}</b></div>
      <div>Mum Aralığı<b>${Math.round(data.realMs/60000)} dk</b></div>
      <div>SR Bakış<b>${srLen} mum</b></div>
      <div>Hedef R/R<b>${p.rr}R</b></div>
      <div>Kaynak<b>${data.source}</b></div>
      <div>Son Veri<b>${lastTime}</b></div>
      <div>Güven<b>%${confidence}</b></div>
      <div>Fiyat<b>${fmt(price)}</b></div>
      <div>Giriş<b>${fmt(entry)}</b></div>
      <div>Stop<b>${fmt(stop)}</b></div>
      <div>Hedef 1<b>${fmt(tp1)}</b></div>
      <div>Hedef 2<b>${fmt(tp2)}</b></div>
      <div>Hedef 3<b>${fmt(tp3)}</b></div>
      <div>ATR<b>${fmt(at)}</b></div>
    </div>

    <p>
      <b>Veri bağı:</b>
      ${(data.attempts||[]).map(a=>
        `<span class="badge ${a.ok?'good':'bad'}">${a.source}: ${a.ok?"ÇALIŞTI":"ÇALIŞMADI "+(a.error||"")}</span>`
      ).join("")}
    </p>

    <p>
      <b>Çalışan bağlam:</b> ${worked}
      <span class="badge good">ÇALIŞTI</span>
      <b>Çalışmayan bağlam:</b> ${failed}
      <span class="badge ${failed?'bad':'good'}">${failed}</span>
    </p>

    <p class="notice">Her time frame kendi mum verisi, ATR, destek/direnç ve hedef katsayısıyla hesaplanır. Sistem emir göndermez; karar destek analizidir.</p>

    <p><b>LONG sebepleri:</b><br>${long.map(x=>`<span class="badge good">${x}</span>`).join("")}</p>
    <p><b>SHORT sebepleri:</b><br>${short.map(x=>`<span class="badge bad">${x}</span>`).join("")}</p>
    <p><b>Nötr / Bilgi:</b><br>${info.map(x=>`<span class="badge info">${x}</span>`).join("")}</p>
    <p><b>Çalışan analiz bağları:</b><br>${ctx.filter(x=>x.ok).map(x=>`<span class="badge info">${x.name}</span>`).join("")}</p>

    ${failed?`<p><b>Çalışmayan bağlar:</b><br>${ctx.filter(x=>!x.ok).map(x=>`<span class="badge bad">${x.name}: ${x.msg}</span>`).join("")}</p>`:""}
  `);
}

function drawChart(c,entry,stop,tp){
  let canvas=el("chart");
  let ctx=canvas.getContext("2d");
  let w=canvas.width;
  let h=canvas.height;

  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="#0f1528";
  ctx.fillRect(0,0,w,h);

  let arr=c.slice(-90);

  let min=Math.min(...arr,entry,stop,tp);
  let max=Math.max(...arr,entry,stop,tp);
  let pad=(max-min)*0.08||1;

  min-=pad;
  max+=pad;

  let y=v=>h-20-(v-min)/(max-min)*(h-40);
  let x=i=>20+i/(arr.length-1)*(w-40);

  ctx.strokeStyle="#7aa2ff";
  ctx.lineWidth=2;
  ctx.beginPath();

  arr.forEach((v,i)=>{
    if(i)ctx.lineTo(x(i),y(v));
    else ctx.moveTo(x(i),y(v));
  });

  ctx.stroke();

  function line(v,color,name){
    ctx.strokeStyle=color;
    ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(20,y(v));
    ctx.lineTo(w-20,y(v));
    ctx.stroke();

    ctx.fillStyle=color;
    ctx.font="13px Arial";
    ctx.fillText(name+" "+fmt(v),24,y(v)-4);
  }

  line(entry,"#ffd166","Giriş");
  line(stop,"#ff6b7a","Stop");
  line(tp,"#2cff9a","Hedef");
}

renderList();
analyzeSelected();
</script>
